services:
  db:
    image: postgis/postgis:17-3.5
    container_name: VP_db
    platform: linux/amd64
    environment:
      - POSTGRES_DB=vehiclePark
      - POSTGRES_USER=park
      - POSTGRES_PASSWORD=park_dev
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U park -d vehiclePark" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    container_name: VP_app
    build: .
    ports:
      - 8080:8080
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=vehiclePark
      - DB_USER=park
      - DB_PASSWORD=park_dev
      - HBM2DDL=validate
      - JAVA_OPTS=-Duser.timezone=UTC
      - GH_KEY=${GH_KEY}
      - TG_BOT_NAME=${TG_BOT_NAME}
      - TG_BOT_TOKEN=${TG_BOT_TOKEN}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/login" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy

  cypress:
    container_name: cypress
    image: cypress/included:15.13.0
    volumes:
      - ./cypress:/e2e
    working_dir: /e2e
    platform: linux/amd64
    depends_on:
      app:
        condition: service_healthy
